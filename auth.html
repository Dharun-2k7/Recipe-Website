<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — RecipeFinder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <!-- Header -->
    <div class="auth-card-header">
      <div class="brand">Recipe<em>Finder</em></div>
      <p>Discover & share amazing recipes</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign In</button>
      <button class="auth-tab" id="tab-signup">Create Account</button>
      <button class="auth-tab" id="tab-forgot">Reset Password</button>
    </div>

    <div class="auth-form-wrap">

      <!-- Login Form -->
      <form class="auth-form" id="form-login" style="display:flex">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <div class="form-message"></div>
        <button type="submit" class="btn-primary">Sign In</button>
        <p style="text-align:center;font-size:0.82rem;color:var(--bark-light)">
          Don't have an account? <a href="#" onclick="document.getElementById('tab-signup').click();return false" style="color:var(--saffron-dk);font-weight:500">Create one</a>
        </p>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="form-signup" style="display:none">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input class="form-input" type="password" name="confirm" placeholder="Repeat password" required autocomplete="new-password">
        </div>
        <div class="form-message"></div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <!-- Forgot Password Form -->
      <form class="auth-form" id="form-forgot" style="display:none">
        <p style="font-size:0.875rem;color:var(--bark-light);line-height:1.5">
          Enter your email and we'll send you a 6-digit OTP to reset your password.
        </p>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-message"></div>
        <button type="submit" class="btn-primary">Send Reset Code</button>
      </form>

      <!-- OTP Verification Form -->
      <form class="auth-form" id="form-otp" style="display:none">
        <p style="font-size:0.875rem;color:var(--bark-light);line-height:1.5">
          We sent a 6-digit code to your email.
        </p>
        <div class="form-group">
          <label class="form-label">Confirmation Code (OTP)</label>
          <input class="form-input" type="text" name="token" placeholder="123456" required autocomplete="one-time-code">
        </div>
        <div class="form-message"></div>
        <button type="submit" class="btn-primary">Verify Code</button>
      </form>

      <!-- Update Password Form (After Reset OTP) -->
      <form class="auth-form" id="form-update-password" style="display:none">
        <p style="font-size:0.875rem;color:var(--bark-light);line-height:1.5">
          Enter your new password below.
        </p>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input class="form-input" type="password" name="confirm" placeholder="Repeat password" required autocomplete="new-password">
        </div>
        <div class="form-message"></div>
        <button type="submit" class="btn-primary">Update Password</button>
      </form>

    </div>

    <div class="auth-footer">
      <a href="index.html">← Back to recipes</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="module">
  import { initAuthPage } from './js/auth.js';
  await initAuthPage();
</script>

</body>
</html>
